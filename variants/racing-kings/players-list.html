<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>All Titled Players | Racing Kings Title System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/home.css">
<link rel="stylesheet" href="../../assets/css/animations.css">

<style>

.players-toolbar{
  position:sticky;
  top:90px;
  z-index:500;

  display:flex;
  flex-wrap:wrap;
  gap:12px;

  padding:16px;
  margin-bottom:24px;

  border:1px solid var(--border);
  border-radius:var(--radius-lg);

  background:rgba(15,15,15,.95);
  backdrop-filter:blur(18px);
}

.players-search{
  flex:1;
  min-width:250px;
}

.players-search input,
.players-toolbar select{
  width:100%;
  padding:12px 14px;

  border-radius:12px;
  border:1px solid var(--border);

  background:rgba(255,255,255,.04);
  color:var(--text);

  font:inherit;
}

.players-table{
  width:100%;
  border-collapse:collapse;
}

.players-table th,
.players-table td{
  padding:16px;
  text-align:left;
  border-bottom:1px solid var(--border);
}

.players-table th{
  color:var(--muted);
  font-size:.9rem;
}

.player-link{
  color:var(--text);
  font-weight:600;
}

.player-link:hover{
  text-decoration:underline;
}

.title-badge{
  display:inline-flex;
  align-items:center;

  padding:6px 10px;

  border-radius:999px;

  border:1px solid var(--border);

  background:rgba(255,255,255,.04);

  font-size:.85rem;
}

.empty-message{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

</style>

</head>
<body>

<div class="page-shell">

<header class="site-header reveal">
  <div class="header-inner">

    <a class="brand" href="../../index.html">
      <span class="brand-title">Variant Title System</span>
      <span class="brand-subtitle">Racing Kings Title System</span>
    </a>

    <nav class="variant-nav">
      <a class="nav-chip" href="index.html">Home</a>
      <a class="nav-chip" href="leaderboard.html">Leaderboard</a>
      <a class="nav-chip" href="titles.html">Titles</a>
      <a class="nav-chip active" href="players.html">Players</a>
      <a class="nav-chip" href="hall-of-fame.html">Hall of Fame</a>
      <a class="nav-chip" href="news.html">News</a>
      <a class="nav-chip" href="community.html">Community</a>
      <a class="nav-chip" href="about.html">About</a>
    </nav>

  </div>
</header>

<main>

<section class="hero" style="min-height:auto;padding-bottom:40px;">
  <div class="container">
    <div class="hero-copy reveal">

      <span class="kicker">
        Player Database
      </span>

      <h1>
        <span class="accent">Players</span>
        All Titled Players
      </h1>

    </div>
  </div>
</section>

<section class="section">

<div class="container">

<div class="players-toolbar">

  <div class="players-search">
    <input
      id="searchInput"
      type="text"
      placeholder="Search players..."
    >
  </div>

  <select id="titleFilter">
    <option value="">All Titles</option>
  </select>

  <select id="countryFilter">
    <option value="">All Countries</option>
  </select>

  <select id="sortFilter">
    <option value="name">Sort: Name</option>
    <option value="title">Sort: Title</option>
    <option value="country">Sort: Country</option>
    <option value="joined">Sort: Joined</option>
  </select>

</div>

<div class="hero-panel">

<table class="players-table">

<thead>
<tr>
  <th>Player</th>
  <th>Title</th>
  <th>Country</th>
  <th>Joined</th>
</tr>
</thead>

<tbody id="playersTableBody">
<tr>
  <td colspan="4">Loading...</td>
</tr>
</tbody>

</table>

</div>

</div>

</section>

</main>

<footer class="footer">
  <div class="container footer-inner">
    <div>
      <strong>Racing Kings Title System</strong><br>
      <span>Unofficial community project.</span>
    </div>
  </div>
</footer>

</div>

<script>

let allPlayers=[];

const tableBody=document.getElementById("playersTableBody");

const searchInput=document.getElementById("searchInput");
const titleFilter=document.getElementById("titleFilter");
const countryFilter=document.getElementById("countryFilter");
const sortFilter=document.getElementById("sortFilter");

async function loadPlayers(){

  const response=await fetch("../json/players.json");
  const data=await response.json();

  allPlayers=data.players || [];

  populateFilters();

  renderPlayers();
}

function populateFilters(){

  const titles=new Set();
  const countries=new Set();

  allPlayers.forEach(player=>{

    (player.currentTitles.main || []).forEach(title=>{
      if(title) titles.add(title);
    });

    if(player.country){
      countries.add(player.country);
    }

  });

  [...titles].sort().forEach(title=>{

    titleFilter.innerHTML +=
      `<option value="${title}">${title}</option>`;

  });

  [...countries].sort().forEach(country=>{

    countryFilter.innerHTML +=
      `<option value="${country}">${country}</option>`;

  });

}

function renderPlayers(){

  let players=[...allPlayers];

  const search=searchInput.value.toLowerCase();
  const title=titleFilter.value;
  const country=countryFilter.value;
  const sort=sortFilter.value;

  players=players.filter(player=>{

    const matchesSearch=
      player.player.toLowerCase().includes(search);

    const matchesTitle=
      !title ||
      (player.currentTitles.main || []).includes(title);

    const matchesCountry=
      !country ||
      player.country===country;

    return (
      matchesSearch &&
      matchesTitle &&
      matchesCountry
    );

  });

  players.sort((a,b)=>{

    if(sort==="country"){
      return a.country.localeCompare(b.country);
    }

    if(sort==="title"){
      return (
        (a.currentTitles.main[0]||"")
        .localeCompare(
          b.currentTitles.main[0]||""
        )
      );
    }

    if(sort==="joined"){
      return a.joined.localeCompare(b.joined);
    }

    return a.player.localeCompare(b.player);

  });

  if(players.length===0){

    tableBody.innerHTML=
    `
    <tr>
      <td colspan="4" class="empty-message">
        No players found.
      </td>
    </tr>
    `;

    return;
  }

  tableBody.innerHTML=players.map(player=>`

    <tr>

      <td>
        <a
          class="player-link"
          href="profile.html?id=${player.playerId}"
        >
          ${player.player}
        </a>
      </td>

      <td>
        <span class="title-badge">
          ${player.currentTitles.main[0] || "—"}
        </span>
      </td>

      <td>${player.country}</td>

      <td>${player.joined}</td>

    </tr>

  `).join("");

}

searchInput.addEventListener("input",renderPlayers);
titleFilter.addEventListener("change",renderPlayers);
countryFilter.addEventListener("change",renderPlayers);
sortFilter.addEventListener("change",renderPlayers);

loadPlayers();

</script>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/animations.js"></script>

</body>
</html>
