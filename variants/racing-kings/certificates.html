<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Certificates | Racing Kings Title System</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/home.css">
<link rel="stylesheet" href="../../assets/css/animations.css">

<style>

.cert-toolbar{
  position:sticky;
  top:90px;
  z-index:500;

  display:flex;
  flex-wrap:wrap;
  gap:12px;

  padding:16px;
  margin-bottom:24px;

  border:1px solid var(--border);
  border-radius:var(--radius-lg);

  background:rgba(15,15,15,.95);
  backdrop-filter:blur(18px);
}

.cert-toolbar input,
.cert-toolbar select{
  flex:1;
  min-width:180px;

  padding:12px 14px;

  border-radius:12px;
  border:1px solid var(--border);

  background:rgba(255,255,255,.04);
  color:var(--text);

  font:inherit;
}

.cert-table{
  width:100%;
  border-collapse:collapse;
}

.cert-table th,
.cert-table td{
  padding:16px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

.cert-table th{
  color:var(--muted);
}

.empty{
  text-align:center;
  padding:40px;
  color:var(--muted);
}

</style>

</head>
<body>

<div class="page-shell">

<header class="site-header reveal">
<div class="header-inner">

    <a class="brand" href="index.html" aria-label="Variant Title System home">
  <img src="../../assets/IMG_2272.png"
       alt="Variant Title System"
       class="brand-logo">
</a>

<nav class="variant-nav">
<a class="nav-chip" href="index.html">Home</a>
<a class="nav-chip" href="leaderboard.html">Leaderboard</a>
<a class="nav-chip" href="titles.html">Titles</a>
<a class="nav-chip" href="players.html">Players</a>
<a class="nav-chip" href="hall-of-fame.html">Hall of Fame</a>
<a class="nav-chip" href="news.html">News</a>
<a class="nav-chip" href="community.html">Community</a>
<a class="nav-chip" href="about.html">About</a>
</nav>

</div>
</header>

<main>

<section class="hero" style="min-height:auto;padding-bottom:40px;">
<div class="container">

<div class="hero-copy reveal">

<span class="kicker">Documents</span>

<h1>
<span class="accent">Certificates</span>
All Awarded Titles
</h1>

</div>

</div>
</section>

<section class="section">

<div class="container">

<div class="cert-toolbar">

<input id="search" placeholder="Search player or title...">

<select id="titleFilter">
<option value="">All Titles</option>
</select>

<select id="countryFilter">
<option value="">All Countries</option>
</select>

<select id="sortFilter">
<option value="date">Sort: Date</option>
<option value="player">Sort: Player</option>
<option value="title">Sort: Title</option>
</select>

</div>

<div class="profile-card">

<table class="cert-table">

<thead>
<tr>
<th>Player</th>
<th>Title</th>
<th>Date</th>
<th>View</th>
</tr>
</thead>

<tbody id="certBody">
<tr><td colspan="4">Loading...</td></tr>
</tbody>

</table>

</div>

</div>

</section>

</main>

<footer class="footer">
<div class="container footer-inner">
<div>
<strong>Racing Kings Title System</strong><br>
<span>Unofficial community project.</span>
</div>
</div>
</footer>

</div>

<script>

let allCertificates = [];

const certBody = document.getElementById("certBody");

const search = document.getElementById("search");
const titleFilter = document.getElementById("titleFilter");
const countryFilter = document.getElementById("countryFilter");
const sortFilter = document.getElementById("sortFilter");

async function load(){

  const res = await fetch("../../json/players.json");
  const data = await res.json();

  const players = data.players || [];

  const certs = [];

  players.forEach(p => {

    (p.certificates || []).forEach(c => {

      certs.push({
        player: p.player,
        country: p.country,
        title: c.title,
        date: c.date,
        image: c.image
      });

    });

  });

  allCertificates = certs;

  populateFilters();
  render();

}

function populateFilters(){

  const titles = new Set();
  const countries = new Set();

  allCertificates.forEach(c => {
    if(c.title) titles.add(c.title);
    if(c.country) countries.add(c.country);
  });

  [...titles].sort().forEach(t => {
    titleFilter.innerHTML += `<option value="${t}">${t}</option>`;
  });

  [...countries].sort().forEach(c => {
    countryFilter.innerHTML += `<option value="${c}">${c}</option>`;
  });

}

function render(){

  let list = [...allCertificates];

  const q = search.value.toLowerCase();
  const t = titleFilter.value;
  const c = countryFilter.value;
  const s = sortFilter.value;

  list = list.filter(x => {

    return (
      (!q || x.player.toLowerCase().includes(q) || x.title.toLowerCase().includes(q)) &&
      (!t || x.title === t) &&
      (!c || x.country === c)
    );

  });

  list.sort((a,b) => {

    if(s === "player") return a.player.localeCompare(b.player);
    if(s === "title") return a.title.localeCompare(b.title);
    return b.date.localeCompare(a.date);

  });

  if(list.length === 0){
    certBody.innerHTML = `
      <tr>
        <td colspan="4" class="empty">No certificates found.</td>
      </tr>
    `;
    return;
  }

  certBody.innerHTML = list.map((c, index) => `

    <tr>

      <td>${c.player}</td>

      <td>${c.title}</td>

      <td>${c.date}</td>

      <td>
        <button
          class="button"
          type="button"
          onclick="toggleCertificate(${index}, '${c.image}')"
          id="btn-${index}">
          View
        </button>
      </td>

    </tr>

    <tr id="cert-row-${index}" style="display:none;">

      <td colspan="4" style="padding:20px;text-align:center;">

        <img
          id="cert-img-${index}"
          src=""
          alt="Certificate"
          style="
            max-width:100%;
            height:auto;
            border-radius:12px;
            border:1px solid var(--border);
          ">

      </td>

    </tr>

  `).join("");

}

function toggleCertificate(index, imagePath){

  const row = document.getElementById(`cert-row-${index}`);
  const img = document.getElementById(`cert-img-${index}`);
  const btn = document.getElementById(`btn-${index}`);

  if(row.style.display === "none"){

    img.src = imagePath;
    row.style.display = "table-row";
    btn.textContent = "Close";

  } else {

    row.style.display = "none";
    btn.textContent = "View";

  }

}

search.addEventListener("input", render);
titleFilter.addEventListener("change", render);
countryFilter.addEventListener("change", render);
sortFilter.addEventListener("change", render);

load();
  
</script>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/animations.js"></script>

</body>
</html>
