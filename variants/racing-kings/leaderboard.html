<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Leaderboard | Racing Kings Title System</title>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/home.css">
<link rel="stylesheet" href="../../assets/css/leaderboard.css">
</head>
<body>

<div class="page-shell">

<header class="site-header">
  <div class="header-inner">

    <a class="brand" href="index.html">
      <span class="brand-title">Variant Title System</span>
      <span class="brand-subtitle">Racing Kings Title System</span>
    </a>

    <nav class="variant-nav">
      <a class="nav-chip" href="index.html">Home</a>
      <a class="nav-chip active" href="leaderboard.html">Leaderboard</a>
      <a class="nav-chip" href="titles.html">Titles</a>
      <a class="nav-chip" href="players.html">Players</a>
      <a class="nav-chip" href="hall-of-fame.html">Hall of Fame</a>
      <a class="nav-chip" href="news.html">News</a>
      <a class="nav-chip" href="community.html">Community</a>
      <a class="nav-chip" href="about.html">About</a>
    </nav>

  </div>
</header>

<main class="section leaderboard-page">

<div class="container">

<div class="section-header">
<h1>Leaderboard</h1>
<p>Browse titled Racing Kings players and the current Lichess Top 10.</p>
</div>

<div class="filters">

<select id="modeFilter">
<option value="titles">Title Holders</option>
<option value="top10">Top 10 Lichess</option>
</select>

<select id="titleFilter">
<option value="all">All Titles</option>
<option value="RKWC">RKWC</option>
<option value="RKSGM">RKSGM</option>
<option value="RKGM">RKGM</option>
<option value="RKIM">RKIM</option>
<option value="RKM">RKM</option>
<option value="RKCM">RKCM</option>
<option value="RKV">RKV</option>
<option value="RKHM">RKHM</option>
<option value="Member">Member</option>
</select>

<select id="countryFilter">
<option value="all">All Countries</option>
</select>

<select id="sortFilter">
<option value="title">Title Rank</option>
<option value="rating">Rating</option>
<option value="joined">Member Since</option>
<option value="country">Country</option>
</select>

</div>

<div id="leaderboardContainer">

<table class="leaderboard-table">
<thead>
<tr>
<th>#</th>
<th>Player</th>
<th>Country</th>
<th>Rating</th>
<th>Titles</th>
</tr>
</thead>

<tbody id="leaderboardBody">
<tr>
<td colspan="5">Loading...</td>
</tr>
</tbody>

</table>

</div>

</div>

</main>

</div>

<script src="../../assets/js/leaderboard.js"></script>
</body>
</html>
